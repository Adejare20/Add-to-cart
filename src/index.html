<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./output.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
  </head>
  <body class="bg-amber-50">
    <div>
      <h1 class="text-black text-[48px] font-bold ml-2">Dessert</h1>
    </div>
    <div id="product-container" class="md:flex lg:flex-row flex flex-col gap-5">
      <div
        id="products"
        class="flex flex-col md:ml-2 ml-1 md:grid md:grid-cols-3 gap-2 md:mt-5"
      ></div>
      <div
        id="cart"
        class="flex flex-col p-4 gap-3 border-0 w-full md:w-[400px] h-[350px] rounded-md bg-white"
      >
        <h1 class="text-red-600 text-[30px] font-bold">Your Cart (0)</h1>

        <img
          src="/src/assets/images/illustration-empty-cart.svg"
          alt=""
          class="w-[100px] ml-[100px]"
        />
        <p class="text-[20px] text-amber-800">
          Your added items will appear here
        </p>
      </div>
    </div>
    <div
      id="modal"
      class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50"
    >
      <div class="bg-white rounded-2xl p-8 w-[400px] shadow-2xl">
        <div class="text-4xl text-green-500 mb-2">✔</div>
        <h2 class="text-2xl font-bold text-gray-800">Order Confirmed</h2>
        <p class="text-gray-400 text-sm mb-6">We hope you enjoy your food!</p>
        <div
          id="modal-items"
          class="flex flex-col gap-3 mb-4 divide-y divide-gray-200"
        ></div>
        <div class="flex flex-col gap-3">
          <div class="flex gap-4 justify-between font-bold text-lg pt-4">
            <p>Order Total</p>
            <p id="modal-total"></p>
          </div>
          <button
            onclick="startNewOrder()"
            class="mt6 w-full bg-red-500 text-white py-3 rounded-full font-bold hover:bg-red-600"
          >
            Start New Order
          </button>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
